<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="schoolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#schoolGradient)"/>
  
  <!-- School building icon -->
  <!-- Main building structure -->
  <path d="M 70 140 L 70 85 L 100 60 L 130 85 L 130 140 Z" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Roof -->
  <path d="M 100 60 L 70 85 M 100 60 L 130 85" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Door -->
  <rect x="92" y="115" width="16" height="25" fill="white" rx="2"/>
  
  <!-- Windows -->
  <rect x="75" y="90" width="12" height="12" fill="white" rx="1"/>
  <rect x="75" y="108" width="12" height="12" fill="white" rx="1"/>
  <rect x="113" y="90" width="12" height="12" fill="white" rx="1"/>
  <rect x="113" y="108" width="12" height="12" fill="white" rx="1"/>
  
  <!-- Person/student icon on building -->
  <circle cx="100" cy="70" r="4" fill="white"/>
  <path d="M 100 75 L 100 85" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M 95 80 L 105 80" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
